<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshAI HACKATHON EDITION v14.0 (MODULAR)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #0ea5e9;
            --accent-glow: rgba(14, 165, 233, 0.3);
        }
        
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            min-height: 100vh;
            color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .hero-gradient {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ticket-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .ticket-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(14, 165, 233, 0.4);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.6);
        }

        .status-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 12px currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .video-container {
            background: #020617;
            position: relative;
            border-radius: 2rem;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .puck-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 0 40px var(--accent-glow);
            border: 4px solid rgba(255,255,255,0.1);
            margin-bottom: 2rem;
            position: relative;
        }

        .puck-avatar::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent);
            animation: ring-pulse 2s infinite;
        }

        @keyframes ring-pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .control-btn {
            width: 56px;
            height: 56px;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .control-btn:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.1);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        @keyframes slide-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in {
            animation: slide-in 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-end mb-16">
            <div>
                <div class="flex items-center gap-3 mb-4">
                    <span class="bg-sky-500/10 text-sky-400 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-sky-500/20">v14.0 Modular</span>
                </div>
                <h1 class="text-6xl font-black hero-gradient tracking-tighter mb-2">FreshAI</h1>
                <p class="text-slate-400 font-medium text-lg">Vision-Powered Support Protocol <span class="text-slate-600 px-2">|</span> <span id="headerTicketCount">0 Tickets</span></p>
            </div>
            <div class="flex gap-4">
                <button id="clearAllBtn" class="px-6 py-3 rounded-2xl bg-red-500/10 hover:bg-red-500/20 text-red-400 text-sm font-bold transition-all border border-red-500/20">Wipe System</button>
                <button onclick="document.getElementById('ticketModal').style.display='flex'" class="hidden px-10 py-4 rounded-2xl bg-sky-600 hover:bg-sky-500 text-white font-black text-sm transition-all shadow-2xl shadow-sky-500/20">Raise New Ticket</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- Ticket Creation -->
            <div class="lg:col-span-4 mb-4">
                <div class="glass p-8 rounded-[2.5rem] sticky top-8">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                        <span class="p-2 bg-sky-500/20 rounded-lg">🎫</span> Issue Intake
                    </h2>
                    <form id="ticketIntakeForm" class="space-y-5">
                        <div>
                            <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2">Subject</label>
                            <input id="subject" required class="w-full bg-slate-900/50 border border-white/5 rounded-xl px-4 py-3 text-sm focus:border-sky-500/50 transition-all outline-none" placeholder="Brief issue title...">
                        </div>
                        <div>
                            <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2">Category</label>
                            <select id="type" class="w-full bg-slate-900/50 border border-white/5 rounded-xl px-4 py-3 text-sm focus:border-sky-500/50 transition-all outline-none appearance-none">
                                <option value="General">General Inquiry</option>
                                <option value="Technical">Technical Support</option>
                                <option value="Billing">Billing & Accounts</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-2">Details</label>
                            <textarea id="description" required rows="4" class="w-full bg-slate-900/50 border border-white/5 rounded-xl px-4 py-3 text-sm focus:border-sky-500/50 transition-all outline-none resize-none" placeholder="How can we help?"></textarea>
                        </div>
                        <button type="submit" class="w-full py-4 bg-sky-600 hover:bg-sky-500 text-white font-black rounded-xl transition-all shadow-lg shadow-sky-900/20 active:scale-95">Initialize Ticket</button>
                    </form>
                </div>
            </div>

            <!-- Ticket List -->
            <div class="lg:col-span-8">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-2xl font-bold flex items-center gap-3">
                        <span class="p-2 bg-emerald-500/20 rounded-lg">📋</span> Active Queue
                    </h2>
                    <span id="queueTicketCount" class="bg-slate-800 px-3 py-1 rounded-full text-xs font-bold text-slate-400">0 Tickets</span>
                </div>
                <div id="ticketList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Tickets Loading... -->
                </div>
            </div>
        </div>
    </div>

    <!-- Video Modal -->
    <div id="videoModal" class="fixed inset-0 bg-slate-950/90 hidden items-center justify-center z-50 backdrop-blur-xl">
        <div class="glass w-full max-w-5xl p-6 md:p-10 rounded-[2.5rem] relative mx-4 border border-white/5">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h3 class="text-2xl font-bold flex items-center gap-3 text-white">
                         Vision Support Session
                    </h3>
                    <p id="statusText" class="text-sky-400 text-sm font-medium mt-1 flex items-center gap-2">
                        <span class="w-2 h-2 bg-sky-400 rounded-full pulse"></span> Initializing agent connection...
                    </p>
                </div>
                <button onclick="closeCall()" class="bg-rose-500 hover:bg-rose-400 text-white px-6 py-2.5 rounded-xl transition-all transform hover:scale-105 font-bold shadow-xl shadow-rose-900/20 flex items-center gap-2">
                    <span>End Sync</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div id="videoContainer" class="video-container aspect-video shadow-2xl flex items-center justify-center">
                <!-- Audio Element -->
                <audio id="remoteAudio" autoplay playsinline crossorigin="anonymous" volume="1.0"></audio>

                <!-- Visualizer Area -->
                <div class="flex flex-col md:flex-row items-center justify-center gap-8 w-full p-4">
                    <!-- User Section -->
                    <div class="flex flex-col items-center gap-4">
                        <div id="userCameraContainer" class="relative w-48 aspect-video rounded-2xl overflow-hidden border border-white/10 bg-slate-900 shadow-xl">
                            <video id="localVideo" autoplay muted playsinline class="w-full h-full object-cover"></video>
                        </div>
                        <div id="userBubble" class="opacity-40 transition-opacity duration-300 w-48 bg-slate-800/50 backdrop-blur-md p-2 rounded-xl border border-white/5 min-h-[40px] text-center">
                            <p id="userLiveSubtitle" class="text-slate-400 text-[10px] italic"></p>
                        </div>
                    </div>

                    <!-- Agent Section -->
                    <div class="flex flex-col items-center flex-1 max-w-2xl px-4">
                        <div id="videoAvatarContainer" class="relative w-full aspect-video rounded-3xl overflow-hidden border-2 border-sky-500/20 shadow-2xl bg-black mb-6">
                             <video id="avatarVideo" src="/avatar-video" loop muted playsinline class="w-full h-full object-cover"></video>
                             <div class="absolute top-4 left-4 flex items-center gap-2 bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10">
                                <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                                <span class="text-[10px] font-bold text-white tracking-widest uppercase">Live AI Avatar</span>
                             </div>
                        </div>
                        <div id="subtitleBoard" class="bg-black/60 backdrop-blur-xl border border-sky-500/30 p-4 rounded-2xl w-full min-h-[60px] flex items-center justify-center text-center opacity-0 transition-opacity duration-300">
                            <p id="liveSubtitle" class="text-white text-lg font-bold tracking-tight"></p>
                        </div>
                    </div>
                </div>

                <!-- Chat & Telemetry Overlay -->
                <div class="absolute bottom-4 left-4 right-4 grid grid-cols-2 gap-4 h-32 pointer-events-none opacity-0 hover:opacity-100 transition-opacity">
                    <div id="chatMessages" class="bg-black/60 backdrop-blur-md rounded-xl p-2 overflow-y-auto pointer-events-auto text-[10px]"></div>
                    <div id="telemetryList" class="bg-black/60 backdrop-blur-md rounded-xl p-2 overflow-y-auto pointer-events-auto text-[8px] font-mono text-sky-400"></div>
                </div>

                <!-- Agent Placeholder -->
                <div id="agentPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/80 z-10 backdrop-blur-md">
                    <div class="puck-avatar"><span>P</span></div>
                    <p class="text-sky-400 font-black uppercase tracking-[0.3em] text-[10px] animate-pulse">Syncing Puck Persona</p>
                </div>
            </div>

            <div class="mt-8 flex justify-center gap-8">
                <button id="toggleMic" class="w-14 h-14 bg-slate-800 rounded-2xl hover:bg-slate-700 transition flex items-center justify-center shadow-lg border border-white/5 text-2xl active:scale-95">🎤</button>
            </div>

            <!-- Resolution Confirmation Popup -->
            <div id="resolutionModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm px-4">
                <div class="glass max-w-md w-full p-8 rounded-3xl border border-sky-500/30 text-center">
                    <div class="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-emerald-500/30">
                        <span class="text-2xl">✅</span>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2">Resolve Ticket?</h3>
                    <p id="proposedSolution" class="bg-black/40 p-3 rounded-xl text-[10px] text-emerald-400 italic mb-6 border border-emerald-500/10 max-h-24 overflow-y-auto"></p>
                    <div class="flex gap-4">
                        <button onclick="confirmResolution(true)" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-all">Yes, Close</button>
                        <button onclick="confirmResolution(false)" class="flex-1 bg-white/5 hover:bg-white/10 text-white font-bold py-3 rounded-xl transition-all">Not Yet</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let StreamVideoClient;
        import('https://esm.sh/@stream-io/video-client@1.4.2').then(m => {
            StreamVideoClient = m.StreamVideoClient;
        });

        let client = null;
        let currentCall = null;
        let userId = 'user-' + Math.random().toString(36).substr(2, 6);
        let currentTicketId = null;
        let audioQueue = [];
        let isPlaying = false;
        let nextAudio = null;
        
        // --- Core Functions ---
        async function fetchTickets() {
            const list = document.getElementById('ticketList');
            if (!list) return;

            try {
                const resp = await fetch('/api/tickets');
                const tickets = await resp.json();
                
                const countStr = `${tickets.length} Ticket${tickets.length !== 1 ? 's' : ''}`;
                document.getElementById('headerTicketCount').innerText = countStr;
                document.getElementById('queueTicketCount').innerText = countStr;

                if (tickets.length === 0) {
                    list.innerHTML = '<div class="col-span-full py-16 text-center glass rounded-[2rem] border-dashed border-2 border-slate-800 text-slate-500 font-medium">No active tickets.</div>';
                    return;
                }

                list.innerHTML = tickets.map(t => {
                    const isOpen = t.status.toLowerCase() === 'open';
                    return `
                    <div class="glass p-7 rounded-[2rem] border-l-4 ${isOpen ? 'border-sky-500' : 'border-emerald-500'} ticket-card flex flex-col h-full animate-slide-in">
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-3 py-1 bg-slate-800 rounded-full text-[10px] font-black uppercase tracking-widest ${isOpen ? 'text-sky-400' : 'text-emerald-400'} border border-white/5">
                                ${t.status.charAt(0).toUpperCase() + t.status.slice(1)}
                            </span>
                            <span class="text-[10px] font-bold text-slate-600 uppercase tracking-tighter">${t.id}</span>
                        </div>
                        <h3 class="text-xl font-bold mb-2 text-white/90">${t.subject}</h3>
                        <p class="text-slate-400 text-sm mb-6 flex-grow leading-relaxed">${t.description}</p>
                        
                        ${t.agent_comment ? `
                            <div class="bg-emerald-500/5 p-4 rounded-2xl mb-6 border border-emerald-500/10 relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500/30"></div>
                                <p class="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-1">Agent Resolution</p>
                                <p class="text-sm italic text-slate-300">${t.agent_comment}</p>
                            </div>
                        ` : ''}

                        <div class="flex gap-3 mt-auto">
                            ${isOpen ? `
                                <button onclick="startSession('${t.id}', '${t.subject.replace(/'/g, "\\'")}', '${t.description.replace(/'/g, "\\'")}')" class="flex-1 bg-sky-600 hover:bg-sky-500 text-white px-4 py-3 rounded-xl text-xs font-bold transition-all shadow-lg active:scale-95">Voice Support Call</button>
                            ` : `
                                <div class="w-full py-3 text-center text-emerald-500 text-xs font-black uppercase tracking-widest bg-emerald-500/10 rounded-xl border border-emerald-500/20">Finalized</div>
                            `}
                        </div>
                    </div>`;
                }).join('');
            } catch (err) {
                console.error('Failed to fetch tickets:', err);
            }
        }

        async function prefetchNext() {
            if (audioQueue.length > 0 && !nextAudio) {
                const url = audioQueue.shift();
                nextAudio = new Audio(url);
                nextAudio.load();
            }
        }

        async function playNextInQueue() {
            if (isPlaying) return;
            if (!nextAudio && audioQueue.length > 0) await prefetchNext();
            if (!nextAudio) {
                const v = document.getElementById('avatarVideo');
                if (v) v.pause();
                return;
            }
            
            isPlaying = true;
            const currentAudio = nextAudio;
            nextAudio = null;
            
            const v = document.getElementById('avatarVideo');
            if (v) v.play().catch(() => {});

            currentAudio.onended = () => {
                isPlaying = false;
                playNextInQueue();
            };
            
            try {
                prefetchNext(); 
                await currentAudio.play();
            } catch (err) {
                isPlaying = false;
                audioQueue.unshift(currentAudio.src);
            }
        }

        async function setupMedia() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const localVideo = document.getElementById('localVideo');
                if (localVideo) localVideo.srcObject = stream;
                return stream;
            } catch (err) {
                console.error("Media failed:", err);
                return null;
            }
        }

        async function startSession(ticketId, ticketSubject, ticketDescription) {
            const stream = await setupMedia();
            if (!stream) return alert("Camera/Mic required.");

            currentTicketId = ticketId;
            document.getElementById('videoModal').style.display = 'flex';
            document.getElementById('statusText').innerText = 'Initializing...';
            document.getElementById('agentPlaceholder').style.display = 'flex';

            try {
                const resp = await fetch('/tokens/' + userId);
                const { token, api_key } = await resp.json();

                client = new StreamVideoClient({ apiKey: api_key, user: { id: userId, name: 'User' }, token });
                const callId = ticketId.toLowerCase().replace(/[^a-z0-9]/g, '');
                currentCall = client.call('default', callId);
                
                currentCall.on('trackAdded', (e) => {
                    const { participant, track } = e;
                    if (participant.userId.includes('agent') && track.kind === 'audio') {
                        const audio = document.getElementById('remoteAudio');
                        audio.srcObject = new MediaStream([track]);
                        audio.play().catch(() => {});
                        document.getElementById('statusText').innerText = 'Connected to Puck';
                    }
                });

                currentCall.on('custom', (e) => {
                    const msg = e.custom || (e.event && e.event.custom);
                    if (!msg) return;

                    if (msg.type === 'audio_url') {
                        audioQueue.push(msg.url);
                        playNextInQueue();
                    }
                    if (msg.type === 'user_transcript') {
                        const b = document.getElementById('userBubble');
                        document.getElementById('userLiveSubtitle').innerText = msg.text;
                        b.classList.replace('opacity-40', 'opacity-100');
                        setTimeout(() => b.classList.replace('opacity-100', 'opacity-40'), 3000);
                    }
                    if (msg.type === 'transcript') {
                        const board = document.getElementById('subtitleBoard');
                        document.getElementById('liveSubtitle').innerText = msg.text;
                        board.style.opacity = '1';
                        setTimeout(() => board.style.opacity = '0', 5000);
                        addChatMessage('Agent', msg.text);
                    }
                    if (msg.type === 'request_closure') {
                        document.getElementById('proposedSolution').innerText = msg.solution || '';
                        document.getElementById('resolutionModal').classList.remove('hidden');
                    }
                });

                await currentCall.join({ create: true, stream });
                await currentCall.microphone.enable();

                await fetch('/start-agent-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticket_id: ticketId, call_id: callId })
                });

                document.getElementById('agentPlaceholder').style.display = 'none';
            } catch (err) {
                alert('Start failed: ' + err.message);
                closeCall();
            }
        }

        async function closeCall() {
            if (currentCall) {
                const v = document.getElementById('localVideo');
                if (v && v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
                await currentCall.leave();
                currentCall = null;
            }
            if (client) {
                await client.disconnectUser();
                client = null;
            }
            document.getElementById('videoModal').style.display = 'none';
            await fetchTickets();
        }

        function addChatMessage(sender, text) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            const isUser = sender === 'You' || sender === 'User';
            div.className = `p-1 rounded-lg mb-1 ${isUser ? 'bg-sky-500/20 text-right ml-auto' : 'bg-white/5 text-left mr-auto'}`;
            div.innerHTML = `<span class="opacity-40 mr-1">${sender}:</span>${text}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function handleCreateTicket(e) {
            e.preventDefault();
            const data = {
                subject: document.getElementById('subject').value,
                description: document.getElementById('description').value,
                type: document.getElementById('type').value
            };
            try {
                await fetch('/api/tickets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                e.target.reset();
                await fetchTickets();
            } catch (err) { console.error(err); }
        }

        async function confirmResolution(confirmed) {
            document.getElementById('resolutionModal').classList.add('hidden');
            if (confirmed) {
                const solution = document.getElementById('proposedSolution').innerText;
                await fetch(`/api/tickets/${currentTicketId}/resolve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ solution: solution })
                });
                closeCall();
            }
        }

        // --- Init ---
        document.getElementById('ticketIntakeForm').onsubmit = handleCreateTicket;
        document.getElementById('clearAllBtn').onclick = async () => {
            if (confirm('Wipe system?')) {
                await fetch('/api/tickets', { method: 'DELETE' });
                await fetchTickets();
            }
        };

        document.getElementById('toggleMic').onclick = async () => {
            if (!currentCall) return;
            await currentCall.microphone.toggle();
            const micBtn = document.getElementById('toggleMic');
            const isMuted = currentCall.microphone.state.isMuted;
            micBtn.innerText = isMuted ? '🔇' : '🎤';
            micBtn.classList.toggle('bg-sky-600', !isMuted);
            micBtn.classList.toggle('bg-slate-800', isMuted);
        };

        fetchTickets();
        setInterval(fetchTickets, 5000);

        // Global exports
        window.startSession = startSession;
        window.closeCall = closeCall;
        window.confirmResolution = confirmResolution;
    </script>
</body>
</html>
